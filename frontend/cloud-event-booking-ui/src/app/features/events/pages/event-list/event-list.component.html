
<button routerLink="/create">Create Event</button>
<h2>Event List</h2>

<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Description</th>
      <th>Location</th>
      <th>Date</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let event of events">
      <td>{{event.name}}</td>
      <td>{{event.description}}</td>
      <td>{{event.location}}</td>
      <td>{{event.date}}</td>
    </tr>
  </tbody>

</table>
